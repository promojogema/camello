<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐪 Carrera de Camellos</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:#111;color:#fff;}
.pantalla{display:none;flex-direction:column;align-items:center;justify-content:center;height:100dvh;padding:1.5rem;gap:1rem;text-align:center;}
.pantalla.activa{display:flex;}
h1{font-size:clamp(1.8rem,7vw,3.5rem);font-weight:900;}
h2{font-size:clamp(1.1rem,4vw,1.6rem);font-weight:700;}
.btn{border:none;padding:.8rem 1.8rem;font-size:1rem;border-radius:12px;cursor:pointer;font-weight:700;transition:transform .1s,filter .15s;user-select:none;}
.btn:active{transform:scale(.96);}
.btn-primario{background:#d4890f;color:#fff;box-shadow:0 4px 0 #8a5a06;}
.btn-primario:hover{filter:brightness(1.1);}
.btn-secundario{background:transparent;color:#d4890f;border:2px solid #d4890f;}
.btn-peligro{background:#c0392b;color:#fff;}
.input{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);color:#fff;padding:.7rem 1rem;font-size:1.1rem;border-radius:10px;outline:none;transition:border-color .2s;}
.input:focus{border-color:#d4890f;}
.input-codigo{width:180px;text-align:center;letter-spacing:.4em;text-transform:uppercase;font-size:1.5rem;font-weight:700;}
.codigo-grande{font-size:clamp(2.5rem,10vw,5rem);font-weight:900;color:#ffd700;letter-spacing:.3em;font-family:monospace;}
.subtexto{color:rgba(255,255,255,.45);font-size:.85rem;max-width:320px;line-height:1.5;}
.lista-jug{display:flex;flex-direction:column;gap:.4rem;width:100%;max-width:340px;}
.item-jug{background:rgba(255,255,255,.07);border-radius:10px;padding:.55rem .9rem;display:flex;align-items:center;gap:.7rem;border-left:4px solid #555;}
.spinner{width:36px;height:36px;border:3px solid rgba(212,137,15,.25);border-top-color:#d4890f;border-radius:50%;animation:girar .9s linear infinite;}
@keyframes girar{to{transform:rotate(360deg);}}

/* CONFIG PANEL */
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;width:100%;max-width:360px;}
.config-item{background:rgba(255,255,255,.06);border-radius:10px;padding:.6rem .8rem;display:flex;flex-direction:column;gap:.3rem;}
.config-label{font-size:.7rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;}
.config-val{font-size:1.1rem;font-weight:700;color:#ffd700;}
.config-row{display:flex;align-items:center;gap:.5rem;}
.config-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:28px;height:28px;border-radius:6px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.config-btn:hover{background:rgba(255,255,255,.2);}

/* TABLERO */
#tablero{display:none;flex-direction:column;height:100dvh;overflow:hidden;position:relative;}
#tablero.activa{display:flex;}
.t-top{display:flex;align-items:center;justify-content:space-between;padding:.35rem .8rem;background:rgba(0,0,0,.55);flex-shrink:0;gap:.4rem;z-index:2;}
.t-sala{font-size:.75rem;}
.t-sala-label{
